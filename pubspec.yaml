name: super_naviagtion_page
description: >
  SuperNaviagtionPage — a GeniusLink package providing NavigationPage,
  an independent in-widget navigation container. Views open parent-bounded
  popups/overlays with a private stack, back/back-to-root, data passing, typed
  results, unlimited nesting, and modes: bottom sheet, drawer, full-screen
  overlay, or dialog. Multiple containers work independently; system back
  targets the active one. Retention can preserve, suspend, recreate, or
  dispose stacks. Supports light/dark and LTR/RTL.

# package version
version: 0.2.1

# package homepage, repository, and issue tracker
homepage: https://github.com/GeniusSystems24/super_naviagtion_page
repository: https://github.com/GeniusSystems24/super_naviagtion_page
issue_tracker: https://github.com/GeniusSystems24/super_naviagtion_page/issues

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core: ">=2.1.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
